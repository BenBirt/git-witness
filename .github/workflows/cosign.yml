name: Cosign Checkpoint
on:
  issues:
    types: [opened]

jobs:
  cosign:
    if: startsWith(github.event.issue.title, 'checkpoint:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    concurrency:
      group: cosign-${{ github.event.issue.title }}
      cancel-in-progress: false
    steps:
      - uses: project-oak/git-ratchet/actions/cosign@v0.1.6
        with:
          witness-key: ${{ secrets.WITNESS_SIGNING_KEY }}

  # Separate job so the issue is closed even if the cosign job fails
  # during setup (e.g. Action resolution error), before any steps run.
  cleanup:
    needs: cosign
    if: >-
      always() &&
      startsWith(github.event.issue.title, 'checkpoint:') &&
      needs.cosign.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issue on failure
        env:
          ISSUE: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh issue comment "$ISSUE" \
            --body "❌ Rejected. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          gh issue close "$ISSUE" --reason "not planned"
